default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>

development:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>

test:
  <<: *default
  database: student_management_test

production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>

  cable:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    schema_dump: cable_schema

  queue:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    schema_dump: queue_schema

  cache:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
    schema_dump: cache_schema